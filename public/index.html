<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>HEALTH MATE PRO</title>
    <style>
        :root { --neon-cyan: #00FFFB; --neon-pink: #ff004c; --bg: #050505; --card-bg: rgba(255,255,255,0.06); }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); color: white; font-family: 'Pretendard', sans-serif; overflow: hidden; }

        /* [STEP 1] 메인 홈 */
        #home-screen {
            position: absolute; width: 100%; height: 100%; display: flex; flex-direction: column;
            align-items: center; justify-content: center; background: #000; z-index: 1000; transition: 0.6s;
        }
        .logo-img { width: 150px; height: 150px; border-radius: 50%; border: 3px solid var(--neon-cyan); box-shadow: 0 0 30px var(--neon-cyan); margin-bottom: 30px; }
        .menu-row { display: flex; gap: 30px; }
        .menu-card {
            background: var(--card-bg); border: 1px solid #333; padding: 40px; border-radius: 25px;
            width: 320px; text-align: center; cursor: pointer; transition: 0.3s;
        }
        .menu-card:hover { border-color: var(--neon-cyan); transform: translateY(-10px); }

        /* [STEP 2] 2단계 세부 선택 */
        #sub-select-screen {
            position: absolute; width: 100%; height: 100%; display: flex; flex-direction: column;
            align-items: center; justify-content: center; background: radial-gradient(circle, #111 0%, #000 100%);
            z-index: 900; transition: 0.5s;
        }

        /* [STEP 3] 최종 분석 모드 */
        #analysis-screen { display: flex; flex-direction: column; width: 100%; height: 100vh; padding: 25px; box-sizing: border-box; }
        .view-container { display: flex; flex: 1; gap: 20px; margin-top: 15px; }
        .view-pane { flex: 1; position: relative; background: #000; border: 1px solid #222; border-radius: 30px; overflow: hidden; }
        
        canvas, video { position: absolute; width: 100%; height: 100%; object-fit: contain; }
        .count-badge { position: absolute; top: 25px; left: 25px; z-index: 100; background: rgba(0,0,0,0.8); padding: 20px; border-radius: 15px; border-left: 6px solid var(--neon-cyan); }
        
        .btn-back { padding: 12px 30px; background: none; border: 1px solid #555; color: #888; border-radius: 30px; cursor: pointer; font-weight: bold; }
        .btn-save { padding: 18px 100px; background: var(--neon-cyan); color: #000; font-weight: 900; border: none; border-radius: 40px; cursor: pointer; box-shadow: 0 0 30px var(--neon-cyan); }

        .hidden { display: none !important; opacity: 0; }
    </style>
</head>
<body>

    <div id="home-screen">
        <img src="/healthmate_logo.png" class="logo-img">
        <h1 style="text-shadow: 0 0 10px var(--neon-cyan);">HEALTH MATE PRO</h1>
        <div class="menu-row">
            <div class="menu-card" onclick="navToSub()">
                <h2 style="color: var(--neon-cyan);">⚡ AI 실시간 분석</h2>
                <p>내 몸의 움직임을 실시간으로 분석하여<br>아바타와 동기화합니다.</p>
            </div>
            <div class="menu-card" onclick="alert('📖 정석 가이드는 준비 중입니다!')">
                <h2 style="color: var(--neon-pink);">📖 초심자 정석 가이드</h2>
                <p>전문가의 스쿼트 영상을 분석합니다.</p>
            </div>
        </div>
    </div>

    <div id="sub-select-screen" class="hidden">
        <button class="btn-back" style="position:absolute; top:40px; right:40px;" onclick="navToHome()">BACK</button>
        <h2 style="color: var(--neon-pink); margin-bottom: 50px;">분석 모드를 선택하세요</h2>
        <div class="menu-row" style="flex-direction: column;">
            <div class="menu-card" style="width: 400px;" onclick="startAnalysis('realtime')"><h3>실시간 캠 분석</h3></div>
            <div class="menu-card" style="width: 400px; margin-top: 20px;" onclick="startAnalysis('video')"><h3>정석 영상 분석</h3></div>
        </div>
    </div>

    <div id="analysis-screen" class="hidden">
        <header style="display:flex; justify-content:space-between; align-items:center;">
            <button class="btn-back" onclick="navToSub()">← BACK</button>
            <div id="mode-title" style="font-weight:900; color:var(--neon-pink);">SQUAT ANALYSIS</div>
            <div style="width:100px;"></div>
        </header>
        <div class="view-container">
            <div class="view-pane">
                <div class="count-badge"><div id="count-num" style="font-size:45px; font-weight:900; color:var(--neon-cyan);">0</div></div>
                <video id="input-video" autoplay muted playsinline style="display:none;"></video>
                <canvas id="yolo-canvas"></canvas>
            </div>
            <div class="view-pane" id="avatar-container"></div>
        </div>
        <div style="text-align:center; padding-top:20px;">
            <button class="btn-save" onclick="saveToDB()">SAVE TO MONGODB</button>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'https://cdn.skypack.dev/three@0.132.2';
        import { GLTFLoader } from 'https://cdn.skypack.dev/three@0.132.2/examples/jsm/loaders/GLTFLoader.js';

        let scene, camera, renderer, mixer, squatAction, squatClip, yoloWorker;
        let count = 0, isDown = false, hipBase = 0;
        let currentMode = '';

        const video = document.getElementById('input-video');
        const canvas = document.getElementById('yolo-canvas');
        const ctx = canvas.getContext('2d');

        window.navToSub = () => { document.getElementById('home-screen').classList.add('hidden'); document.getElementById('sub-select-screen').classList.remove('hidden'); };
        window.navToHome = () => { document.getElementById('sub-select-screen').classList.add('hidden'); document.getElementById('home-screen').classList.remove('hidden'); };

        window.startAnalysis = async (mode) => {
            currentMode = mode;
            document.getElementById('sub-select-screen').classList.add('hidden');
            document.getElementById('analysis-screen').classList.remove('hidden');
            initThree();
            initAI();
            if (mode === 'realtime') {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;
            } else {
                video.srcObject = null; video.src = "/squat.mp4"; video.loop = true; video.play();
            }
        };

        function initThree() {
            const container = document.getElementById('avatar-container');
            container.innerHTML = '';
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(45, container.clientWidth/container.clientHeight, 0.1, 1000);
            camera.position.set(0, 1.5, 3.5);
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            container.appendChild(renderer.domElement);
            scene.add(new THREE.AmbientLight(0xffffff, 1.5));
            const loader = new GLTFLoader();
            loader.load('/models/Untitled_gym.glb', (g) => scene.add(g.scene));
            loader.load('/models/Untitled_squat.glb', (g) => {
                const avatar = g.scene; avatar.position.set(0, 0, 0.5); scene.add(avatar);
                mixer = new THREE.AnimationMixer(avatar);
                squatClip = g.animations[0];
                squatAction = mixer.clipAction(squatClip);
                squatAction.play(); squatAction.paused = true;
            });
            function anim() { requestAnimationFrame(anim); renderer.render(scene, camera); }
            anim();
        }

        function initAI() {
            yoloWorker = new Worker(new URL("/src/yoloWorker.js", import.meta.url), { type: "module" });
            yoloWorker.postMessage({ type: "init", payload: { modelUrl: "/models/yolo_pose.onnx" } });
            yoloWorker.onmessage = (e) => {
                if (e.data.type === "inferResult" && e.data.payload.ok) {
                    processFrame(e.data.payload.kpts);
                }
            };
            setInterval(() => {
                if (video.readyState >= 2) {
                    const tmp = document.createElement('canvas');
                    tmp.width = video.videoWidth; tmp.height = video.videoHeight;
                    tmp.getContext('2d').drawImage(video, 0, 0);
                    yoloWorker.postMessage({ type: "infer", payload: { imageData: tmp.getContext('2d').getImageData(0,0,tmp.width,tmp.height), width: tmp.width, height: tmp.height }});
                }
            }, 100);
        }

        function processFrame(kpts) {
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0);
            const pts = kpts.map(p => ({ x: p.x, y: p.y, v: p.s > 0.3 }));
            if (pts[11].v && pts[12].v) {
                const hipY = (pts[11].y + pts[12].y) / 2;
                if (hipBase === 0) hipBase = hipY;
                let progress = Math.max(0, Math.min(1, (hipY - hipBase) / 85));
                if (squatAction) {
                    squatAction.time = squatClip.duration * progress * 0.45;
                    mixer.update(0.01);
                }
                if (progress > 0.8 && !isDown) isDown = true;
                if (progress < 0.2 && isDown) { isDown = false; count++; document.getElementById('count-num').innerText = count; }
            }
            ctx.strokeStyle = "#00FFFB"; ctx.lineWidth = 6;
            [[5,6],[11,12],[11,13],[13,15],[12,14],[14,16]].forEach(([s, e]) => {
                if (pts[s]?.v && pts[e]?.v) { ctx.beginPath(); ctx.moveTo(pts[s].x, pts[s].y); ctx.lineTo(pts[e].x, pts[e].y); ctx.stroke(); }
            });
        }

        window.saveToDB = async () => {
            const kst = new Date().toLocaleString("ko-KR", {timeZone: "Asia/Seoul"});
            await fetch('/api/workout', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ studentId: "2025730082", count: count, kst_time: kst, mode: currentMode }) });
            alert("DB 저장 완료!");
        };
    </script>
</body>
</html>
