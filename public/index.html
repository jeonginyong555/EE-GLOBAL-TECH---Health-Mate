<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HEALTH MATE PRO - Integrated</title>
    <style>
        :root { --neon-cyan: #00FFFB; --neon-pink: #ff004c; --bg-color: #050505; --card-bg: rgba(255,255,255,0.07); --text-color: #ffffff; }
        body.light-mode { --bg-color: #f4f7f6; --card-bg: rgba(0,0,0,0.06); --text-color: #1a1a2e; }
        body { margin: 0; background: var(--bg-color); color: var(--text-color); font-family: 'Pretendard', sans-serif; overflow: hidden; height: 100vh; display: flex; flex-direction: column; transition: 0.3s; }
        .theme-toggle { position: fixed; top: 15px; right: 15px; z-index: 10000; background: var(--card-bg); border: 1px solid #444; color: var(--text-color); padding: 10px 15px; border-radius: 12px; cursor: pointer; font-size: 13px; font-weight: bold; display: flex; align-items: center; gap: 8px; backdrop-filter: blur(10px); }
        .user-id-fixed { position: fixed; bottom: 15px; right: 20px; z-index: 10000; font-size: 12px; font-family: monospace; color: #777; letter-spacing: 1px; }
        .screen { position: absolute; width: 100%; height: 100vh; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .hidden { opacity: 0; visibility: hidden; pointer-events: none; transform: translateY(10px); }
        #home-screen { background: radial-gradient(circle at center, var(--bg-color) 0%, #000 100%); }
        .logo-img { width: 180px; height: 180px; border-radius: 50%; border: 3px solid var(--neon-cyan); box-shadow: 0 0 30px var(--neon-cyan); margin-bottom: 25px; }
        h1.brand-name { font-size: 45px; font-weight: 900; margin: 0 0 45px 0; background: linear-gradient(to bottom, #fff, #999); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; width: 100%; max-width: 700px; padding: 0 20px; box-sizing: border-box; }
        .nav-card { background: var(--card-bg); border: 1px solid #333; padding: 35px; border-radius: 22px; text-align: center; cursor: pointer; transition: 0.3s; }
        .nav-card:hover { border-color: var(--neon-cyan); transform: translateY(-7px); }
        .view-pane { flex: 1; position: relative; border-radius: 22px; background: #000; border: 1px solid #333; overflow: hidden; }
        video, canvas { position: absolute; width: 100%; height: 100%; object-fit: contain; }
        .data-overlay { position: absolute; top: 20px; left: 20px; z-index: 100; background: rgba(0,0,0,0.8); padding: 20px; border-radius: 15px; border-left: 5px solid var(--neon-pink); }
        .stat-val { font-size: 30px; font-weight: 900; color: var(--neon-cyan); margin-bottom: 12px; }
        .footer-ctrl { width: 100%; padding: 20px; background: var(--bg-color); display: flex; justify-content: center; border-top: 1px solid #333; position: fixed; bottom: 0; }
        .save-btn { padding: 13px 80px; border: none; border-radius: 40px; background: var(--neon-cyan); color: #000; font-weight: 900; font-size: 17px; cursor: pointer; }
    </style>
</head>
<body>
    <button class="theme-toggle" onclick="window.toggleTheme()">
        <span id="theme-icon">🌙</span> <span id="theme-text">DARK MODE</span>
    </button>
    <div class="user-id-fixed">STUDENT ID: 2025730082</div>

    <div id="home-screen" class="screen">
        <img src="healthmate_logo.png" alt="Logo" class="logo-img">
        <h1 class="brand-name">HEALTH MATE</h1>
        <div class="menu-grid">
            <div class="nav-card" onclick="window.showModeSelect()"><h3>⚡ AI 분석</h3></div>
            <div class="nav-card" onclick="alert('준비 중!')"><h3>📖 가이드</h3></div>
        </div>
    </div>

    <div id="mode-screen" class="screen hidden">
        <div style="display:flex; gap:20px;">
            <div class="nav-card" onclick="window.startApp('webcam')"><h3>📷 웹캠</h3></div>
            <div class="nav-card" onclick="window.startApp('video')"><h3>🎬 영상</h3></div>
        </div>
        <button onclick="window.goHome()" style="margin-top:20px; color:#999; cursor:pointer; background:none; border:none; text-decoration:underline;">BACK</button>
    </div>

    <div id="app-screen" class="screen hidden" style="justify-content: flex-start;">
        <header style="width:100%; padding:20px; border-bottom:1px solid #333;">
            <button onclick="window.backToMode()" style="background:#333; color:white; border:none; padding:10px 20px; border-radius:8px; cursor:pointer;">← BACK</button>
        </header>
        <div style="display:flex; flex:1; width:100%; padding:20px; gap:20px; box-sizing:border-box;">
            <div class="view-pane">
                <div class="data-overlay">
                    <div style="font-size:10px; color:#888;">COUNT</div>
                    <div id="count-val" class="stat-val">0</div>
                    <div id="progress-val" class="stat-val">0%</div>
                </div>
                <video id="webcam" autoplay muted playsinline style="display:none;"></video>
                <canvas id="output-canvas"></canvas>
            </div>
            <div class="view-pane" id="avatar-pane"></div>
        </div>
        <footer class="footer-ctrl"><button class="save-btn" id="btn-save">STORE SESSION</button></footer>
    </div>

    <script type="module">
        import * as THREE from 'https://cdn.skypack.dev/three@0.132.2';
        import { GLTFLoader } from 'https://cdn.skypack.dev/three@0.132.2/examples/jsm/loaders/GLTFLoader.js';
        import { OrbitControls } from 'https://cdn.skypack.dev/three@0.132.2/examples/jsm/controls/OrbitControls.js';

        const video = document.getElementById('webcam');
        const canvas = document.getElementById('output-canvas');
        const ctx = canvas.getContext('2d');
        let scene, camera, renderer, avatar, controls, requestID, yoloWorker;
        let squatCount = 0, isDown = false, initialHipY = 0;

        // [핵심] 세정님 워커 연결
        function initWorker() {
            if (yoloWorker) return;
            yoloWorker = new Worker(new URL("./yoloWorker.js", import.meta.url), { type: "module" });
            yoloWorker.postMessage({ type: "init", payload: { modelUrl: "./models/yolo_pose.onnx" } });
            yoloWorker.onmessage = (e) => {
                if (e.data.type === "inferResult" && e.data.payload.ok) {
                    processPose(e.data.payload.kpts);
                }
            };
        }

        function processPose(kpts) {
            const pts = kpts.map(p => ({ x: p.x, y: p.y, v: p.s > 0.3 }));
            if (pts[11].v && pts[12].v) {
                const h = (pts[11].y + pts[12].y) / 2;
                if (initialHipY === 0 || h < initialHipY) initialHipY = h;
                let p = Math.max(0, Math.min(1, (h - initialHipY) / 85));
                document.getElementById('progress-val').innerText = Math.round(p * 100) + "%";
                if (avatar) {
                    avatar.position.y = -p * 0.45;
                }
                if (p > 0.75 && !isDown) isDown = true;
                if (p < 0.25 && isDown) { isDown = false; squatCount++; document.getElementById('count-val').innerText = squatCount; }
            }
            drawSkeleton(pts);
        }

        async function captureFrame() {
            if (document.getElementById('app-screen').classList.contains('hidden')) return;
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            const tCanvas = document.createElement('canvas');
            tCanvas.width = video.videoWidth; tCanvas.height = video.videoHeight;
            const tCtx = tCanvas.getContext('2d');
            tCtx.drawImage(video, 0, 0);
            yoloWorker.postMessage({ type: "infer", payload: { imageData: tCtx.getImageData(0,0,canvas.width,canvas.height), width: canvas.width, height: canvas.height }});
            requestID = requestAnimationFrame(captureFrame);
        }

        function drawSkeleton(pts) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            ctx.lineWidth = 5; ctx.strokeStyle = "#00FFFB";
            [[5,6],[5,11],[6,12],[11,12],[11,13],[13,15],[12,14],[14,16]].forEach(([s, e]) => {
                if (pts[s]?.v && pts[e]?.v) { ctx.beginPath(); ctx.moveTo(pts[s].x, pts[s].y); ctx.lineTo(pts[e].x, pts[e].y); ctx.stroke(); }
            });
        }

        window.showModeSelect = () => { document.getElementById('home-screen').classList.add('hidden'); document.getElementById('mode-screen').classList.remove('hidden'); };
        window.goHome = () => { document.getElementById('mode-screen').classList.add('hidden'); document.getElementById('home-screen').classList.remove('hidden'); };
        window.startApp = async (type) => {
            initWorker();
            document.getElementById('mode-screen').classList.add('hidden'); document.getElementById('app-screen').classList.remove('hidden');
            if (type === 'webcam') {
                video.srcObject = await navigator.mediaDevices.getUserMedia({ video: true });
            } else { video.src = "./squat.mp4"; }
            video.onloadedmetadata = () => captureFrame();
        };

        window.backToMode = () => { location.reload(); };

        // [중요] 인용님 KST 저장 로직
        document.getElementById('btn-save').onclick = async () => {
            const now = new Date();
            const kstTime = new Intl.DateTimeFormat('ko-KR', {
                year: 'numeric', month: '2-digit', day: '2-digit',
                hour: '2-digit', minute: '2-digit', second: '2-digit',
                hour12: false, timeZone: 'Asia/Seoul'
            }).format(now).replace(/\. /g, '-').replace('.', '');

            const payload = { studentId: "2025730082", name: "Jeong In-yong", count: squatCount, kst_time: kstTime };
            await fetch('http://localhost:3000/api/workout', { 
                method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) 
            });
            alert(`정인용 님, 저장 완료! (${kstTime})`);
        };
    </script>
</body>
</html>
