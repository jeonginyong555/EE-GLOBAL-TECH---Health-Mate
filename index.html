<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HEALTH MATE PRO</title>
  <style>
    :root {
      --bg-color: #05070b;
      --text-color: #ffffff;
      --muted: #9aa4b2;
      --card-bg: rgba(20, 20, 24, 0.88);
      --line: rgba(255, 255, 255, 0.08);
      --neon-cyan: #1fe4ff;
    }

    body.light-mode {
      --bg-color: #eef3f7;
      --text-color: #111827;
      --muted: #5b6470;
      --card-bg: rgba(255, 255, 255, 0.92);
      --line: rgba(17, 24, 39, 0.08);
      --neon-cyan: #00c7e6;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg-color);
      color: var(--text-color);
    }

    body {
      background:
        radial-gradient(circle at top, rgba(31, 228, 255, 0.08), transparent 35%),
        radial-gradient(circle at bottom, rgba(31, 228, 255, 0.04), transparent 25%),
        var(--bg-color);
    }

    .hidden {
      display: none !important;
      pointer-events: none !important;
    }

    .screen {
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    #mode-screen {
      align-items: center;
      justify-content: center;
      gap: 36px;
      padding: 24px;
      z-index: 20;
    }

    #app-screen {
      padding: 14px 16px 16px;
      gap: 12px;
      z-index: 10;
    }

    .theme-btn {
      position: absolute;
      top: 16px;
      right: 16px;
      border: 1px solid var(--line);
      background: var(--card-bg);
      color: var(--text-color);
      border-radius: 14px;
      padding: 12px 18px;
      cursor: pointer;
      font-size: 15px;
      font-weight: 700;
      z-index: 100;
      backdrop-filter: blur(10px);
    }

    .mode-title {
      margin: 0;
      font-size: 36px;
      font-weight: 900;
      letter-spacing: 0.5px;
      text-align: center;
    }

    .mode-container {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
      width: 100%;
      max-width: 1080px;
    }

    .mode-card {
      background: var(--card-bg);
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 30px 24px;
      cursor: pointer;
      transition: 0.25s ease;
      min-height: 240px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      user-select: none;
    }

    .mode-card:hover {
      border-color: var(--neon-cyan);
      transform: translateY(-6px);
      box-shadow: 0 0 24px rgba(31, 228, 255, 0.18);
    }

    .mode-card h3 {
      margin: 0 0 16px;
      font-size: 26px;
      color: var(--neon-cyan);
      text-align: center;
    }

    .mode-card ul {
      margin: 0;
      padding-left: 20px;
      color: var(--muted);
      line-height: 1.7;
      font-size: 15px;
    }

    .student-id-fixed {
      position: absolute;
      right: 20px;
      bottom: 16px;
      color: #7c8591;
      font-size: 13px;
      letter-spacing: 2px;
    }

    .app-topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-shrink: 0;
    }

    .topbar-left {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .back-btn {
      border: 1px solid var(--line);
      background: var(--card-bg);
      color: var(--text-color);
      border-radius: 12px;
      padding: 10px 15px;
      cursor: pointer;
      font-weight: 800;
      font-size: 14px;
    }

    .brand-mini {
      font-size: 18px;
      font-weight: 900;
      color: var(--neon-cyan);
      letter-spacing: 0.5px;
    }

    .main-grid {
      flex: 1;
      min-height: 0;
      display: flex;
    }

    .viewer-card {
      width: 100%;
      height: 100%;
      background: var(--card-bg);
      border: 1px solid var(--line);
      border-radius: 18px;
      backdrop-filter: blur(10px);
      overflow: hidden;
      padding: 12px;
    }

    .viewer-stage {
      position: relative;
      width: 100%;
      height: 100%;
      min-height: 0;
      background: #000;
      border-radius: 16px;
      overflow: hidden;
      isolation: isolate;
    }

    .stage-layer {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      object-fit: contain;
      background: transparent;
    }

    #video {
      z-index: 1;
      background: #000;
      display: none;
    }

    #guideVideo {
      z-index: 2;
      background: #000;
      display: none;
      pointer-events: auto;
      cursor: pointer;
    }

    #canvas {
      z-index: 3;
      background: transparent;
      display: none;
      pointer-events: none;
    }

    #threeWrap {
      z-index: 5;
      background: #0d1117;
      display: none;
      pointer-events: auto;
      cursor: pointer;
    }

    #overlay {
      z-index: 6;
      background: transparent;
      display: none;
      pointer-events: none;
    }

    #threeWrap canvas {
      width: 100% !important;
      height: 100% !important;
      display: block;
    }

    .stage-main {
      inset: 0 !important;
      width: 100% !important;
      height: 100% !important;
      border-radius: 0 !important;
      box-shadow: none !important;
    }

    .stage-pip {
      inset: auto 18px 86px auto !important;
      width: 240px !important;
      height: 320px !important;
      border-radius: 16px !important;
      overflow: hidden !important;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.45);
      border: 1px solid rgba(255,255,255,0.12);
    }

    .floating-chip {
      position: absolute;
      z-index: 20;
      padding: 10px 14px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: rgba(10, 12, 18, 0.65);
      color: #fff;
      backdrop-filter: blur(8px);
      font-size: 14px;
      font-weight: 800;
      pointer-events: none;
    }

    #modeChip { top: 12px; left: 12px; }
    #statusChip { top: 12px; right: 12px; }
    #gestureChip { bottom: 12px; right: 12px; color: var(--neon-cyan); }
    #helpChip {
      bottom: 12px;
      left: 12px;
      max-width: 56%;
      line-height: 1.4;
      font-size: 13px;
      font-weight: 700;
    }

    .counter-chip {
      top: 14px;
      left: 50%;
      transform: translateX(-50%);
      min-width: 88px;
      text-align: center;
      font-size: 34px;
      font-weight: 900;
      color: #ffffff;
      background: rgba(0, 0, 0, 0.32);
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 18px;
      padding: 10px 22px;
      box-shadow:
        0 8px 24px rgba(0, 0, 0, 0.26),
        0 0 18px rgba(31, 228, 255, 0.16);
      backdrop-filter: blur(10px);
      pointer-events: none;
      z-index: 30;
      transition:
        transform 0.18s ease,
        opacity 0.18s ease,
        box-shadow 0.18s ease;
      opacity: 0.96;
    }

    .counter-chip.pop {
      transform: translateX(-50%) scale(1.12);
      box-shadow:
        0 10px 28px rgba(0, 0, 0, 0.32),
        0 0 26px rgba(31, 228, 255, 0.30);
    }

    body.light-mode .counter-chip {
      background: rgba(255, 255, 255, 0.62);
      color: #111827;
      border: 1px solid rgba(17, 24, 39, 0.08);
    }

    .feedback-toast-wrap {
      position: absolute;
      top: 72px;
      right: 14px;
      z-index: 28;
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: min(360px, calc(100% - 28px));
      pointer-events: none;
    }

    .feedback-toast {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 12px 14px;
      border-radius: 16px;
      color: #fff;
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.10);
      box-shadow: 0 12px 28px rgba(0,0,0,0.28);
      animation: toastIn 0.22s ease;
      opacity: 0.98;
    }

    .feedback-toast.good {
      background: rgba(33, 225, 123, 0.18);
      border-color: rgba(33, 225, 123, 0.35);
    }

    .feedback-toast.warn {
      background: rgba(255, 176, 32, 0.18);
      border-color: rgba(255, 176, 32, 0.35);
    }

    .feedback-toast.bad {
      background: rgba(255, 90, 103, 0.18);
      border-color: rgba(255, 90, 103, 0.35);
    }

    .feedback-toast.missing {
      background: rgba(57, 160, 255, 0.18);
      border-color: rgba(57, 160, 255, 0.35);
    }

    .feedback-toast-icon {
      flex: 0 0 auto;
      width: 28px;
      height: 28px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      font-size: 14px;
      font-weight: 900;
      background: rgba(255,255,255,0.14);
    }

    .feedback-toast-body {
      min-width: 0;
      flex: 1;
    }

    .feedback-toast-title {
      font-size: 14px;
      font-weight: 900;
      line-height: 1.2;
      margin-bottom: 4px;
    }

    .feedback-toast-text {
      font-size: 13px;
      line-height: 1.45;
      color: rgba(255,255,255,0.92);
      word-break: keep-all;
    }

    .feedback-toast.hide {
      animation: toastOut 0.20s ease forwards;
    }

    body.light-mode .feedback-toast {
      color: #111827;
      box-shadow: 0 10px 24px rgba(17, 24, 39, 0.12);
    }

    body.light-mode .feedback-toast .feedback-toast-text {
      color: rgba(17, 24, 39, 0.88);
    }

    body.light-mode .feedback-toast-icon {
      background: rgba(17,24,39,0.08);
    }

    @keyframes toastIn {
      from {
        opacity: 0;
        transform: translateY(-8px) scale(0.98);
      }
      to {
        opacity: 0.98;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes toastOut {
      from {
        opacity: 0.98;
        transform: translateY(0) scale(1);
      }
      to {
        opacity: 0;
        transform: translateY(-6px) scale(0.98);
      }
    }

    .control-panel {
      position: absolute;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      z-index: 21;
      display: flex;
      gap: 10px;
      align-items: center;
      background: rgba(10, 12, 18, 0.56);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 8px 10px;
      backdrop-filter: blur(10px);
    }

    .action-btn {
      border: none;
      border-radius: 999px;
      padding: 10px 16px;
      font-size: 13px;
      font-weight: 900;
      cursor: pointer;
    }

    .primary-btn {
      background: var(--neon-cyan);
      color: #000;
    }

    .ghost-btn {
      background: #20222c;
      color: #fff;
      border: 1px solid var(--line);
    }

    .control-inline {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 12px;
      padding: 0 6px;
      user-select: none;
    }

    @media (max-width: 1100px) {
      .mode-container {
        grid-template-columns: 1fr;
      }

      .brand-mini {
        font-size: 15px;
      }

      .control-panel {
        flex-wrap: wrap;
        justify-content: center;
        width: calc(100% - 24px);
        border-radius: 18px;
      }
    }

    @media (max-width: 900px) {
      .stage-pip {
        width: 170px !important;
        height: 226px !important;
        inset: auto 12px 84px auto !important;
      }

      .counter-chip {
        top: 12px;
        font-size: 28px;
        min-width: 74px;
        padding: 8px 18px;
      }

      .feedback-toast-wrap {
        top: 64px;
        right: 10px;
        width: min(320px, calc(100% - 20px));
      }

      .feedback-toast {
        padding: 11px 12px;
        border-radius: 14px;
      }
    }
  </style>
</head>
<body>
  <button id="themeToggle" class="theme-btn">🌙 DARK MODE</button>

  <div id="mode-screen" class="screen">
    <h2 class="mode-title">SELECT MODE</h2>

    <div class="mode-container">
      <div class="mode-card" data-mode="standard">
        <h3>🎬 정석 모드</h3>
        <ul>
          <li>아바타 + 비디오/JSON 보기 전용</li>
          <li>제스처 없음</li>
          <li>발표 / 시범용</li>
        </ul>
      </div>

      <div class="mode-card" data-mode="feedback">
        <h3>📷 피드백 모드</h3>
        <ul>
          <li>웹캠 전체창 ↔ 비디오 전체창</li>
          <li>주먹 인식으로 화면 토글</li>
          <li>웹캠 문제를 알림처럼 상세 피드백</li>
        </ul>
      </div>

      <div class="mode-card" data-mode="avatar">
        <h3>🧍 아바타 모드</h3>
        <ul>
          <li>아바타 전체창 ↔ 웹캠 전체창</li>
          <li>주먹 인식으로 화면 토글</li>
          <li>아바타 화면 중심</li>
        </ul>
      </div>
    </div>

    <div class="student-id-fixed">STUDENT ID : 2025730082</div>
  </div>

  <div id="app-screen" class="screen hidden">
    <div class="app-topbar">
      <div class="topbar-left">
        <button id="backBtn" class="back-btn">← BACK</button>
        <div class="brand-mini">HEALTH MATE PRO ENGINE</div>
      </div>
    </div>

    <div class="main-grid">
      <div class="viewer-card">
        <div id="viewerStage" class="viewer-stage">
          <video id="video" class="stage-layer" playsinline muted></video>
          <video id="guideVideo" class="stage-layer" playsinline muted loop></video>
          <canvas id="canvas" class="stage-layer"></canvas>
          <div id="threeWrap" class="stage-layer"></div>
          <canvas id="overlay" class="stage-layer"></canvas>

          <div id="modeChip" class="floating-chip">MODE</div>
          <div id="statusChip" class="floating-chip">READY</div>
          <div id="helpChip" class="floating-chip">설정 대기 중</div>
          <div id="gestureChip" class="floating-chip">GESTURE: -</div>
          <div id="counterChip" class="floating-chip counter-chip hidden">0</div>

          <div id="feedbackToastWrap" class="feedback-toast-wrap"></div>

          <div class="control-panel">
            <button id="manualToggleBtn" class="action-btn primary-btn">수동 전환</button>
            <button id="restartBtn" class="action-btn ghost-btn">재시작</button>
            <label class="control-inline">
              <input id="cameraRotateToggle" type="checkbox" />
              자동 카메라 회전
            </label>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
